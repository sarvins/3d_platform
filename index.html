<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO₂ Platform</title>
  <link rel="stylesheet" href="css/main.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">CO₂</div>
        <span>CO₂ Platform</span>
      </div>
    </header>

    <div class="main">
      <aside id="panel" class="panel">
        <!-- Ingevuld door step1Panel.js + step2Panel.js -->
      </aside>

      <div class="right-col">
        <section id="viewer-section">
          <div class="toggle" id="view-toggle">
            <button class="sel" data-mode="perspective">3D</button>
            <button data-mode="front_sectie">Front sectie</button>
            <button data-mode="links_sectie">Links sectie</button>
          </div>
          <div id="three-container">
            <div class="viewer-label">Parametric preview — not a design environment</div>
          </div>
          <div id="pile-depth-label" class="pile-depth-label" style="display:none">Paaldiepte: ~—m</div>
        </section>

        <div class="charts">
          <div class="chart">
            <div class="chart-head">
              <span class="ttl">CO₂ &amp; hoogte — materiaal<span class="ax">kg CO₂/m²</span></span>
            </div>
            <div class="chart-body">
              <canvas id="co2-chart"></canvas>
            </div>
          </div>
          <div class="chart">
            <div class="chart-head">
              <span class="ttl">Energie gebruik<span class="ax">kWh/m²/jaar</span></span>
            </div>
            <div class="chart-body">
              <canvas id="energy-chart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
